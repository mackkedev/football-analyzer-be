server:
  port: 8080

spring:
  application:
    name: football-analyzer
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:football_analyzer}
    username: ${PGUSER:${DB_USERNAME:postgres}}
    password: ${PGPASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always


# Football-Data.org Configuration
football-data:
  base-url: https://api.football-data.org/v4
  api-key: ${FOOTBALL_DATA_API_KEY:fe9c18564c15497996570a11147690df}
  current-season: 2025
  current-matchday: 28
  competitions:
    premier-league: PL
    serie-a: SA
    bundesliga: BL1
    la-liga: PD
    championship: ELC

